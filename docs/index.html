<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a73e8">
    <meta name="description" content="足彩泊松分析 — 基于 Poisson 分布 + Elo 评分的足球比赛预测工具">
    <title>⚽ 足彩泊松分析</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
</head>
<body>

    <!-- ====== 顶栏 ====== -->
    <header class="app-header">
        <h1>⚽ 足彩泊松分析</h1>
        <span class="header-subtitle">Poisson + Elo 融合模型</span>
    </header>

    <!-- ====== 主内容 ====== -->
    <main class="main-content">

        <!-- 联赛选择 -->
        <div class="card" id="leagueSelector">
            <div class="form-group">
                <label class="form-label">选择联赛</label>
                <select class="form-select" id="leagueSelect" onchange="onLeagueChange()">
                    <option value="">-- 请选择联赛 --</option>
                </select>
            </div>
            <div id="leagueInfo" style="display:none" class="info-box"></div>
        </div>

        <!-- 输入区域 -->
        <div class="card" id="inputArea" style="display:none">
            <div class="card-title">比赛信息</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
                <div class="form-group">
                    <label class="form-label">🏠 主队</label>
                    <div class="team-input-wrap">
                        <span class="team-input-icon">🔍</span>
                        <input type="text" class="team-search-input" id="homeInput"
                               placeholder="例：曼城、利物浦" autocomplete="off">
                        <div class="team-suggestions" id="homeSuggestions"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">✈️ 客队</label>
                    <div class="team-input-wrap">
                        <span class="team-input-icon">🔍</span>
                        <input type="text" class="team-search-input" id="awayInput"
                               placeholder="例：阿森纳、皇马" autocomplete="off">
                        <div class="team-suggestions" id="awaySuggestions"></div>
                    </div>
                </div>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:4px">
                <div class="form-group">
                    <label class="form-label">主胜赔率</label>
                    <input class="form-input" type="number" id="oddsHome" step="0.01" min="1.01" value="1.80">
                </div>
                <div class="form-group">
                    <label class="form-label">平局赔率</label>
                    <input class="form-input" type="number" id="oddsDraw" step="0.01" min="1.01" value="3.40">
                </div>
                <div class="form-group">
                    <label class="form-label">客胜赔率</label>
                    <input class="form-input" type="number" id="oddsAway" step="0.01" min="1.01" value="3.50">
                </div>
            </div>

            <button class="btn btn-primary" id="predictBtn" onclick="doPredict()" style="margin-top:8px" disabled>
                🔮 开始预测
            </button>
        </div>

        <!-- Loading -->
        <div id="loading" class="loading" style="display:none">
            <div class="spinner"></div>
            <span id="loadingText">计算预测中...</span>
        </div>

        <!-- 结果区域 -->
        <div id="result" style="display:none"></div>

    </main>

    <!-- ====== 页脚 ====== -->
    <footer class="app-footer">
        <small>
            数据源: <a href="https://github.com/Yiminshuixing/football.json" target="_blank">football.json</a> ·
            预测模型: Poisson 分布 + Elo 评分 + Dixon-Coles 校正<br>
            仅供研究娱乐，理性购彩
        </small>
    </footer>

    <script src="js/models.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
